name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Expo CLI info
        run: npx expo --version || true

      - name: Start Expo project (non-interactive check)
        run: |
          npx expo start --non-interactive > /tmp/expo-start.log 2>&1 &
          EXPO_PID=$!
          sleep 10
          kill "$EXPO_PID" || true

      - name: Run lint (if configured)
        run: npm run lint --if-present
